# Render Blueprint for Curriculum Generator App
# Two public web services on free tier

services:
  # ===========================================
  # FRONTEND (Next.js)
  # ===========================================
  - type: web
    name: curriculum-frontend
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: packages/frontend
    buildCommand: npm install --production=false && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_AUTH0_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_AUTH0_CLIENT_ID
        sync: false
    healthCheckPath: /
    autoDeploy: true

  # ===========================================
  # BACKEND API (Express)
  # ===========================================
  - type: web
    name: curriculum-api
    runtime: node
    region: oregon
    # `standard` = 2 GB RAM. The free/512 MB plan cannot hold the API
    # process plus Chromium during a PDF/PPT export — the export OOM-kills
    # the whole service. Confirm this plan in the Render dashboard so a
    # Blueprint sync does not silently downgrade it back to free.
    plan: standard
    branch: main
    rootDir: packages/backend
    # `npm install` runs the postinstall hook, which downloads Chromium
    # into the project-local cache (see packages/backend/.puppeteerrc.cjs)
    # so Puppeteer-based PDF/PPT export works at runtime.
    buildCommand: npm install --production=false
    startCommand: npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-5
      - key: CORS_ORIGINS
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: API_SIGNING_SECRET
        generateValue: true
      - key: STORAGE_TYPE
        value: local
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: "52428800"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: LOG_LEVEL
        value: info
      # AWS S3 — SME source-file uploads + cached curriculum exports.
      # Set the bucket name and credentials in the Render dashboard.
      # If left unset, the app falls back to MongoDB GridFS automatically.
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: us-east-1
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
