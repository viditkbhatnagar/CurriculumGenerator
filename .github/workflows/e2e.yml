name: E2E Tests

on:
  # Render takes 3–7 min to deploy after a push, so push-triggered E2E would
  # test stale code. We run on a nightly cron + manual dispatch instead.
  schedule:
    # Daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      frontend_url:
        description: Frontend base URL to test against
        required: false
        default: https://curriculum-frontend-xfyx.onrender.com
      api_url:
        description: Backend base URL to test against
        required: false
        default: https://curriculum-api-bsac.onrender.com
      syllabus_workflow_id:
        description: Workflow ID to use for the Step 14 test (must have step 13 approved)
        required: false
        default: 69df99d849f3cbb71b41d901

jobs:
  playwright:
    name: Playwright (${{ inputs.frontend_url || 'prod default' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e deps
        working-directory: e2e
        run: npm install

      # Cache Playwright browsers across runs — saves ~300MB download per run.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright Chromium (with deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Install OS deps for cached browser
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: e2e
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          E2E_FRONTEND_URL: ${{ inputs.frontend_url || 'https://curriculum-frontend-xfyx.onrender.com' }}
          E2E_API_URL: ${{ inputs.api_url || 'https://curriculum-api-bsac.onrender.com' }}
          E2E_SYLLABUS_WORKFLOW_ID: ${{ inputs.syllabus_workflow_id || '69df99d849f3cbb71b41d901' }}
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test results (traces, videos, screenshots on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 7
